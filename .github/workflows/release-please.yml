name: release-please

# Maintains a release PR from Conventional Commit messages on main: it keeps a
# CHANGELOG.md + version up to date, and on merge cuts a GitHub Release + a v* tag.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # A PAT (RELEASE_PLEASE_TOKEN) is used instead of the default GITHUB_TOKEN so the
          # release tag triggers deploy.yml and CI runs on the release PR — GitHub suppresses
          # those when the default token creates the tag/PR.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
