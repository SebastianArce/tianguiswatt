name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: backend
            dockerfile: backend/Dockerfile
            context: .
          - image: frontend
            dockerfile: frontend/Dockerfile.prod
            context: ./frontend
          - image: orchestrator
            dockerfile: orchestrator/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: o
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.o.outputs.owner }}/tianguiswatt-${{ matrix.image }}:latest
            ghcr.io/${{ steps.o.outputs.owner }}/tianguiswatt-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest
    # Set the repo variable DEPLOY_ENABLED=true once the VM + secrets are ready.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose files to the VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: compose.yml,compose.prod.yml
          target: /opt/tianguiswatt
      - name: Pull, migrate, and roll out
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/tianguiswatt
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            COMPOSE="docker compose -f compose.yml -f compose.prod.yml"
            $COMPOSE pull
            $COMPOSE up -d --wait clickhouse postgres redis
            $COMPOSE run --rm backend python -c "from shared.migrations.runner import migrate; print(migrate())"
            $COMPOSE up -d
            docker image prune -f
