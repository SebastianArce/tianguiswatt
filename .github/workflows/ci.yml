name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    env:
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: renewablepulse
      CLICKHOUSE_PASSWORD: renewablepulse
      CLICKHOUSE_DB: renewablepulse
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.3
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_USER: renewablepulse
          CLICKHOUSE_PASSWORD: renewablepulse
          CLICKHOUSE_DB: renewablepulse
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install workspace
        run: uv sync --all-packages

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format (ruff)
        run: uv run ruff format --check .

      - name: Type-check (ty)
        run: uv run ty check

      - name: Test (pytest)
        run: uv run pytest

      - name: dbt build
        run: |
          uv run python -c "from shared.migrations.runner import migrate; print(migrate())"
          uv run dbt build --project-dir transform --profiles-dir transform
