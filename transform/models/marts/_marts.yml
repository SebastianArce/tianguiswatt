version: 2

models:
  - name: mart_generation_by_fuel
    description: Generation by fuel per 5-minute instant, with share-of-mix %.
    columns:
      - name: measured_at
        tests: [not_null]
      - name: fuel_type
        tests: [not_null]
      - name: generation_mw
        tests: [not_null]

  - name: mart_supply_demand
    description: Demand (INDO/ITSDO) vs latest-instant total generation per settlement period.
    columns:
      - name: settlement_date
        tests: [not_null]
      - name: settlement_period
        tests: [not_null]
      - name: demand_mw
        tests: [not_null]

  - name: mart_carbon
    description: National carbon intensity per half-hour (actual, falling back to forecast).
    columns:
      - name: from_ts
        tests: [not_null]
      - name: intensity_gco2
        tests: [not_null]

  - name: mart_prices
    description: System (imbalance) price + APX/N2EX Market Index Prices per settlement period.
    columns:
      - name: settlement_date
        tests: [not_null]
      - name: settlement_period
        tests: [not_null]
      - name: system_sell_price
        tests: [not_null]

  - name: mart_tariff_periods
    description: >
      Agile import/export rates (p/kWh) + carbon intensity per half-hour — the
      battery simulator's decision row. Import can go negative (plunge pricing);
      carbon is null where its history predates ingestion.
    columns:
      - name: from_ts
        tests: [not_null, unique]
      - name: import_p_kwh
        tests: [not_null]
      - name: export_p_kwh
        tests: [not_null]

  - name: mart_bid_stack
    description: BM bid-offer ladder per settlement period, flagged with accepted actions.
    columns:
      - name: settlement_period
        tests: [not_null]
      - name: national_grid_bm_unit
        tests: [not_null]
      - name: pair_id
        tests: [not_null]

  - name: mart_metrics
    description: Long-format metric rollup (metric × granularity × bucket) for /trends.
    columns:
      - name: metric
        tests: [not_null]
      - name: granularity
        tests: [not_null]
      - name: bucket
        tests: [not_null]
      - name: value
        tests: [not_null]

  - name: mart_accepted_actions
    description: Recent accepted BM actions (BOALF), one row per acceptance.
    columns:
      - name: acceptance_number
        tests: [not_null]
      - name: national_grid_bm_unit
        tests: [not_null]
      - name: acceptance_time
        tests: [not_null]

  - name: mart_frequency
    description: GB system-frequency time series; the dashboard reads the latest value.
    columns:
      - name: measured_at
        tests: [not_null]
      - name: frequency_hz
        tests: [not_null]
