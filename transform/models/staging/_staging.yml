version: 2

models:
  - name: stg_generation_fuelinst
    description: Deduplicated 5-minute generation by fuel type (MW).
    columns:
      - name: settlement_date
        tests: [not_null]
      - name: settlement_period
        tests: [not_null]
      - name: fuel_type
        tests: [not_null]
      - name: measured_at
        tests: [not_null]
      - name: generation_mw
        tests: [not_null]

  - name: stg_demand
    description: Deduplicated demand outturn (INDO/ITSDO) per settlement period.
    columns:
      - name: settlement_date
        tests: [not_null]
      - name: settlement_period
        tests: [not_null]

  - name: stg_carbon_intensity_national
    description: Deduplicated national carbon intensity per half-hour.
    columns:
      - name: from_ts
        tests: [not_null]
      - name: intensity_index
        tests: [not_null]

  - name: stg_system_price
    description: Deduplicated system (imbalance) price per settlement period.
    columns:
      - name: settlement_date
        tests: [not_null]
      - name: settlement_period
        tests: [not_null]
      - name: system_sell_price
        tests: [not_null]

  - name: stg_market_index_price
    description: Deduplicated Market Index Price per settlement period and provider.
    columns:
      - name: settlement_date
        tests: [not_null]
      - name: settlement_period
        tests: [not_null]
      - name: data_provider
        tests: [not_null]

  - name: stg_bid_offer
    description: Deduplicated BM bid-offer pairs per settlement period, unit and pairId.
    columns:
      - name: national_grid_bm_unit
        tests: [not_null]
      - name: settlement_period
        tests: [not_null]
      - name: pair_id
        tests: [not_null]

  - name: stg_bid_offer_acceptance
    description: Deduplicated BM bid-offer acceptances, keyed by acceptance number.
    columns:
      - name: acceptance_number
        tests: [not_null]
      - name: national_grid_bm_unit
        tests: [not_null]

  - name: stg_system_frequency
    description: Deduplicated GB system-frequency readings, keyed by measurement time.
    columns:
      - name: measured_at
        tests: [not_null]
      - name: frequency_hz
        tests: [not_null]

  - name: stg_bmu_registry
    description: BMU registry deduplicated to one row per National Grid BMU id.
    columns:
      - name: national_grid_bm_unit
        tests: [not_null, unique]
