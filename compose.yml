name: renewablepulse

# Base stack (production-safe defaults). Local-dev conveniences — exposed DB ports,
# Traefik dashboard — live in compose.override.yml, which Docker applies automatically.

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rp]

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-renewablepulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-renewablepulse}
      POSTGRES_DB: ${POSTGRES_DB:-renewablepulse}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-renewablepulse} -d $${POSTGRES_DB:-renewablepulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rp]

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-renewablepulse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-renewablepulse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-renewablepulse}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rp]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rp]

volumes:
  pg_data:
  ch_data:
  redis_data:

networks:
  rp:
