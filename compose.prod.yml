# Production overlay. Use explicitly (so the dev compose.override.yml is NOT applied):
#   docker compose -f compose.yml -f compose.prod.yml up -d
# Config comes from an .env file on the host (DOMAIN, ACME_EMAIL, *_USER/PASSWORD/DB,
# IMAGE_TAG). Images are pulled from GHCR; no database ports are exposed to the host.

services:
  traefik:
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/acme

  clickhouse:
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  frontend:
    image: ghcr.io/sebastianarce/tianguiswatt-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [rp]
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=le
      - traefik.http.services.frontend.loadbalancer.server.port=80

  backend:
    image: ghcr.io/sebastianarce/tianguiswatt-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    depends_on:
      clickhouse:
        condition: service_healthy
    networks: [rp]
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=le
      - traefik.http.services.backend.loadbalancer.server.port=8000

  dagster-daemon:
    image: ghcr.io/sebastianarce/tianguiswatt-orchestrator:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["dagster-daemon", "run", "-m", "orchestrator.definitions"]
    environment: &dagster-env
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_USERNAME: ${POSTGRES_USER}
      DAGSTER_PG_PASSWORD: ${POSTGRES_PASSWORD}
      DAGSTER_PG_DB: ${POSTGRES_DB}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks: [rp]

  # No Traefik route (the Dagster UI has no auth). Bound to the VM's localhost only —
  # reach it with: ssh -L 3000:localhost:3000 deploy@tianguiswatt.com
  dagster-webserver:
    image: ghcr.io/sebastianarce/tianguiswatt-orchestrator:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment: *dagster-env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [rp]

volumes:
  acme:
