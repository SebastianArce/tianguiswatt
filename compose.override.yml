# Local-development overrides — applied automatically by `docker compose`.
# Exposes data-store ports to the host and enables the Traefik dashboard.
# NOTE: Compose replaces (does not merge) a service's `command`, so the Traefik
# command is repeated here in full with the extra dev flags.

services:
  traefik:
    command:
      - --ping=true
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "8080:8080" # dashboard (insecure, dev only)

  postgres:
    ports:
      - "5432:5432"

  clickhouse:
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/backend
      - --reload-dir
      - /app/packages
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-tianguiswatt}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-tianguiswatt}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-tianguiswatt}
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks: [rp]
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app/backend
        - action: sync
          path: ./packages
          target: /app/packages
        - action: rebuild
          path: ./uv.lock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    depends_on: [backend]
    networks: [rp]
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/vite.config.ts
