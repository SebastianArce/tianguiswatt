# Local-development overrides — applied automatically by `docker compose`.
# Builds backend/frontend from source, exposes data-store ports to the host, enables watch.
# Traefik and Dagster are prod-only (compose.yml `profiles: [prod]`), so dev skips them and
# reaches the app on the direct ports below.

services:
  postgres:
    ports:
      - "5432:5432"

  clickhouse:
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/backend
      - --reload-dir
      - /app/packages
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-tianguiswatt}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-tianguiswatt}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-tianguiswatt}
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app/backend
        - action: sync
          path: ./packages
          target: /app/packages
        - action: rebuild
          path: ./uv.lock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    depends_on: [backend]
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/vite.config.ts
