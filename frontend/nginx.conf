server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown routes serve index.html (Traefik routes /api to the backend).
    location / {
        try_files $uri /index.html;
    }

    # Long-cache hashed assets; never cache the HTML entrypoint.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
